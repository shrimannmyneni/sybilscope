<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SybilScope</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #f0efe8; overflow: hidden; }
.app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; }

/* Top bar */
.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 20px; border-bottom: 0.5px solid #222; }
.logo { font-size: 14px; font-weight: 500; color: #f0efe8; letter-spacing: 1px; }
.logo span { color: #E24B4A; }
.subtitle { font-size: 11px; color: #444; letter-spacing: 1px; }
.stats { display: flex; gap: 8px; margin-left: auto; }
.stat { background: #141418; border: 0.5px solid #222; border-radius: 8px; padding: 6px 14px; text-align: center; min-width: 70px; }
.stat-n { font-size: 18px; font-weight: 500; color: #f0efe8; }
.stat-n.red { color: #E24B4A; }
.stat-n.green { color: #1D9E75; }
.stat-n.amber { color: #EF9F27; }
.stat-l { font-size: 10px; color: #666; letter-spacing: 0.5px; margin-top: 1px; }

/* Input bar */
.input-bar { padding: 12px 20px; background: #0d0d12; border-bottom: 0.5px solid #222; display: flex; gap: 10px; align-items: flex-start; }
.addr-input { flex: 1; background: #141418; border: 0.5px solid #333; border-radius: 8px; padding: 8px 12px; color: #f0efe8; font-size: 12px; font-family: monospace; resize: none; height: 64px; line-height: 1.6; outline: none; }
.addr-input:focus { border-color: #E24B4A; }
.analyze-btn { background: #E24B4A; color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 13px; font-weight: 500; cursor: pointer; height: 64px; white-space: nowrap; transition: background 0.2s; }
.analyze-btn:hover { background: #c93c3b; }
.analyze-btn:disabled { background: #444; cursor: not-allowed; }
.analyze-btn.loading { background: #444; }

/* Main content */
.main { display: grid; grid-template-columns: 1fr 320px; overflow: hidden; }

/* Graph area */
.graph-area { position: relative; background: #080810; border-right: 0.5px solid #1a1a22; overflow: hidden; }
.graph-label { position: absolute; top: 14px; left: 16px; font-size: 11px; color: #444; letter-spacing: 1px; z-index: 2; }
.graph-legend { position: absolute; bottom: 14px; left: 16px; display: flex; gap: 14px; z-index: 2; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Right panel */
.panel { background: #0d0d12; overflow-y: auto; }
.panel-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #333; font-size: 13px; }
.panel-section { padding: 16px; border-bottom: 0.5px solid #1a1a22; }
.panel-title { font-size: 10px; color: #444; letter-spacing: 1px; margin-bottom: 10px; }

/* Verdict badge */
.verdict-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 6px; padding: 6px 12px; margin-bottom: 12px; }
.verdict-badge.sybil { background: #1a0808; border: 0.5px solid #E24B4A; }
.verdict-badge.clean { background: #081a0a; border: 0.5px solid #1D9E75; }
.verdict-dot { width: 8px; height: 8px; border-radius: 50%; }
.verdict-text { font-size: 13px; font-weight: 500; }

/* Confidence bar */
.conf-bar-wrap { margin-bottom: 12px; }
.conf-label { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 5px; }
.conf-val { color: #f0efe8; font-weight: 500; }
.conf-bar { height: 4px; background: #1a1a22; border-radius: 2px; }
.conf-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

/* Evidence */
.evidence-list { display: flex; flex-direction: column; gap: 6px; }
.ev-item { display: flex; gap: 8px; align-items: flex-start; }
.ev-bullet { width: 4px; height: 4px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.ev-text { font-size: 12px; color: #aaa; line-height: 1.5; }

/* Cluster stats */
.cluster-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cs { background: #141418; border-radius: 6px; padding: 10px; }
.cs-n { font-size: 18px; font-weight: 500; color: #f0efe8; }
.cs-l { font-size: 10px; color: #555; margin-top: 2px; }

/* Address list */
.addr-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.addr-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 4px; background: #141418; border: 0.5px solid transparent; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.addr-row:hover { background: #1e1e2a; border-color: #2a2a38; }
.addr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.addr-hash { font-size: 11px; font-family: monospace; color: #888; }
.addr-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: auto; }
.tag-sybil { background: #1a0808; color: #E24B4A; }
.tag-clean { background: #0a1a0a; color: #1D9E75; }
.tag-suspicious { background: #1a1508; color: #EF9F27; }
.tag-likely { background: #1a1200; color: #f0c040; }

/* Reasoning */
.reasoning { font-size: 12px; color: #666; line-height: 1.5; font-style: italic; }

/* Tooltip */
.tooltip { position: absolute; background: #1a1a22; border: 0.5px solid #333; border-radius: 6px; padding: 8px 12px; font-size: 11px; font-family: monospace; color: #aaa; pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.15s; }

/* Loading spinner */
.loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 3px solid #222; border-top-color: #E24B4A; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: #555; letter-spacing: 1px; }
.loading-sub { font-size: 11px; color: #333; }
</style>
</head>
<body>

</div>

// ============================================================
//  State
// ============================================================
let currentData = null;
let selectedCluster = null;
let simulation = null;

// ============================================================
//  Graph rendering
// ============================================================
function nodeColor(d) {
  if (d.is_hub) return "#fff";
  if (d.risk === "CONFIRMED_SYBIL") return "#E24B4A";
  if (d.risk === "LIKELY_SYBIL") return "#E24B4A";
  if (d.risk === "SUSPICIOUS") return "#EF9F27";
  return "#1D9E75";
}

function nodeRadius(d) {
  if (d.is_hub) return 10;
  if (d.risk === "CONFIRMED_SYBIL") return 7;
  return 5;
}

function renderGraph(data) {
  const container = document.getElementById("graph-area");
  d3.select("#graph-svg").remove();

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select(container)
    .append("svg")
    .attr("id", "graph-svg")
    .attr("width", width)
    .attr("height", height)
    .style("position", "absolute")
    .style("top", 0)
    .style("left", 0);

  // Defs: glow + arrow markers
  const defs = svg.append("defs");
  const glowRed = defs.append("filter").attr("id", "glow-red-f").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
  glowRed.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
  glowRed.append("feMerge").selectAll("feMergeNode").data(["blur", "SourceGraphic"]).enter().append("feMergeNode").attr("in", d => d);

  // Arrow markers for directed edges
  defs.append("marker").attr("id", "arrow-red").attr("viewBox", "0 -3 6 6")
    .attr("refX", 12).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path").attr("d", "M0,-3L6,0L0,3").attr("fill", "#E24B4A").attr("opacity", 0.5);
  defs.append("marker").attr("id", "arrow-green").attr("viewBox", "0 -3 6 6")
    .attr("refX", 12).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path").attr("d", "M0,-3L6,0L0,3").attr("fill", "#1D9E75").attr("opacity", 0.5);
  // Transfer-edge arrow (wallet<->wallet tx flow, distinct from funder tree)
  defs.append("marker").attr("id", "arrow-transfer").attr("viewBox", "0 -3 6 6")
    .attr("refX", 12).attr("refY", 0).attr("markerWidth", 7).attr("markerHeight", 7)
    .attr("orient", "auto")
    .append("path").attr("d", "M0,-3L6,0L0,3").attr("fill", "#A855F7").attr("opacity", 0.9);

  const nodes = data.nodes.map(d => ({...d}));
  const edges = data.edges.map(d => ({...d}));

  // Cluster-based positioning
  const clusterCenters = {};
  const clusterIds = [...new Set(nodes.map(n => n.cluster_id))];
  const cx = width / 2, cy = height / 2;
  clusterIds.forEach((cid, i) => {
    const angle = (2 * Math.PI * i) / clusterIds.length - Math.PI / 2;
    const radius = Math.min(width, height) * 0.25;
    clusterCenters[cid] = { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
  });

  nodes.forEach(n => {
    const center = clusterCenters[n.cluster_id] || { x: cx, y: cy };
    n.x = center.x + (Math.random() - 0.5) * 80;
    n.y = center.y + (Math.random() - 0.5) * 80;
  });

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).id(d => d.id).distance(50).strength(0.8))
    .force("charge", d3.forceManyBody().strength(-120))
    .force("center", d3.forceCenter(cx, cy))
    .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 3))
    .force("cluster", alpha => {
      nodes.forEach(n => {
        const center = clusterCenters[n.cluster_id];
        if (center) {
          n.vx += (center.x - n.x) * alpha * 0.1;
          n.vy += (center.y - n.y) * alpha * 0.1;
        }
      });
    });

  // Edges (directed arrows)
  // - type=funding  (default): funder->wallet hub-spoke from the first-funder tree
  // - type=transfer: real wallet<->wallet tx flow (purple, dashed, width ~ tx_count)
  const link = svg.append("g")
    .selectAll("line")
    .data(edges)
    .enter().append("line")
    .attr("stroke", d => {
      if (d.type === "transfer") return "#A855F7";
      const src = nodes.find(n => n.id === (d.source.id || d.source));
      return src && src.is_sybil ? "#E24B4A" : "#1D9E75";
    })
    .attr("stroke-width", d => {
      if (d.type === "transfer") {
        return Math.min(4, 1 + Math.log2((d.tx_count || 1) + 1));
      }
      return 1;
    })
    .attr("stroke-opacity", d => d.type === "transfer" ? 0.8 : 0.4)
    .attr("stroke-dasharray", d => d.type === "transfer" ? "4 3" : null)
    .attr("marker-end", d => {
      if (d.type === "transfer") return "url(#arrow-transfer)";
      const src = nodes.find(n => n.id === (d.source.id || d.source));
      return src && src.is_sybil ? "url(#arrow-red)" : "url(#arrow-green)";
    })
    .append("title")
    .text(d => {
      if (d.type !== "transfer") return "funding edge";
      return `transfer: ${d.tx_count} tx, ${(d.total_amount || 0).toFixed(4)} ETH`;
    });

  // Glow circles behind hubs
  const glow = svg.append("g")
    .selectAll("circle")
    .data(nodes.filter(n => n.is_hub))
    .enter().append("circle")
    .attr("r", 30)
    .attr("fill", "#E24B4A")
    .attr("opacity", 0.08);

  // Nodes
  const node = svg.append("g")
    .selectAll("circle")
    .data(nodes)
    .enter().append("circle")
    .attr("r", d => nodeRadius(d))
    .attr("fill", d => nodeColor(d))
    .attr("opacity", d => d.is_hub ? 0.95 : 0.8)
    .attr("stroke", d => selectedCluster === d.cluster_id ? "#fff" : "none")
    .attr("stroke-width", 1.5)
    .style("cursor", "pointer")
    .on("click", (event, d) => {
      selectedCluster = d.cluster_id;
      showClusterPanel(d.cluster_id);
      node.attr("stroke", n => n.cluster_id === d.cluster_id ? "#fff" : "none");
    })
    .on("mouseenter", (event, d) => {
      const tooltip = document.getElementById("tooltip");
      const risk = d.is_hub ? "HUB" : (d.risk || "");
      const conf = d.confidence ? Math.round(d.confidence * 100) + "%" : "";
      const txs = d.tx_count ? d.tx_count + " txs" : "";
      tooltip.innerHTML = `<div style="font-size:12px;color:#f0efe8;margin-bottom:3px">${d.id}</div>`
        + `<div>${risk}${conf ? " · " + conf : ""}${txs ? " · " + txs : ""}</div>`;
      tooltip.style.opacity = 1;
      tooltip.style.left = (event.offsetX + 12) + "px";
      tooltip.style.top = (event.offsetY - 10) + "px";
    })
    .on("mouseleave", () => {
      document.getElementById("tooltip").style.opacity = 0;
    })
    .call(d3.drag()
      .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // Subtle dot-grid background
  const gridGroup = svg.append("g").attr("pointer-events", "none");
  const gridSpacing = 40;
  for (let gx = gridSpacing; gx < width; gx += gridSpacing) {
    for (let gy = gridSpacing; gy < height; gy += gridSpacing) {
      gridGroup.append("circle").attr("cx", gx).attr("cy", gy).attr("r", 0.8).attr("fill", "#1a1a2a").attr("opacity", 0.6);
    }
  }

  // Cluster label groups (rect backdrop + text)
  const labelGroups = svg.append("g").selectAll("g")
    .data(clusterIds)
    .enter().append("g");

  labelGroups.append("rect")
    .attr("rx", 4)
    .attr("ry", 4)
    .attr("fill", "#0a0a12")
    .attr("opacity", 0.85)
    .attr("height", 18);

  const clusterLabels = labelGroups.append("text")
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 10)
    .attr("fill", "#E24B4A")
    .attr("opacity", 0.9)
    .text(cid => {
      const cl = data.clusters.find(c => c.id === cid);
      return cl ? `cluster ${cid} \u00B7 ${cl.wallet_count} wallets` : "";
    });

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    glow.attr("cx", d => d.x).attr("cy", d => d.y);
    labelGroups.each(function(cid) {
      const clusterNodes = nodes.filter(n => n.cluster_id === cid);
      const avgX = d3.mean(clusterNodes, n => n.x);
      const avgY = d3.max(clusterNodes, n => n.y) + 26;
      const g = d3.select(this);
      const textEl = g.select("text");
      textEl.attr("x", avgX).attr("y", avgY);
      const textLen = textEl.node().getComputedTextLength ? textEl.node().getComputedTextLength() : 80;
      const pad = 8;
      g.select("rect")
        .attr("x", avgX - textLen / 2 - pad)
        .attr("y", avgY - 9)
        .attr("width", textLen + pad * 2);
    });
  });
}

// ============================================================
//  Panel rendering
// ============================================================
function showClusterPanel(clusterId) {
  if (!currentData) return;
  const cluster = currentData.clusters.find(c => c.id === clusterId);
  if (!cluster) return;

  const clusterNodes = currentData.nodes.filter(n => n.cluster_id === clusterId && !n.is_hub);
  const confidencePct = Math.round(cluster.confidence * 100);
  const isSybil = cluster.is_sybil ?? (cluster.confidence > 0.5);
  const color = isSybil ? "#E24B4A" : "#1D9E75";

  let html = `
    <div class="panel-section">
      <div class="panel-title">AI VERDICT \u00B7 CLUSTER ${clusterId}</div>
      <div class="verdict-badge ${isSybil ? 'sybil' : 'clean'}">
        <div class="verdict-dot" style="background:${color}"></div>
        <div class="verdict-text" style="color:${color}">${isSybil ? 'Sybil detected' : 'Legitimate'}</div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-label"><span>Confidence</span><span class="conf-val">${confidencePct}%</span></div>
        <div class="conf-bar"><div class="conf-fill" style="width:${Math.min(confidencePct, 99)}%;background:${color}"></div></div>
      </div>
      <div class="evidence-list">
        ${cluster.evidence.map(e => `
          <div class="ev-item">
            <div class="ev-bullet" style="background:${color}"></div>
            <div class="ev-text">${e}</div>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">CLUSTER STATS</div>
      <div class="cluster-stats">
        <div class="cs"><div class="cs-n" style="color:${color}">${cluster.wallet_count}</div><div class="cs-l">Wallets in cluster</div></div>
        <div class="cs"><div class="cs-n" style="color:#EF9F27">${cluster.stolen_usd != null && isFinite(cluster.stolen_usd) ? '$' + (cluster.stolen_usd / 1000).toFixed(0) + 'K' : '$unknown'}</div><div class="cs-l">Tokens flagged</div></div>
        <div class="cs"><div class="cs-n">${cluster.avg_similarity != null && isFinite(cluster.avg_similarity) ? (cluster.avg_similarity * 100).toFixed(0) + '%' : '—'}</div><div class="cs-l">Avg similarity</div></div>
        <div class="cs"><div class="cs-n">${cluster.funder.slice(0,6)}...</div><div class="cs-l">Root funder</div></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">ADDRESSES</div>
      <div class="addr-list">
        ${clusterNodes.map(n => {
          const tagClass = n.risk === "CONFIRMED_SYBIL" ? "tag-sybil" : n.risk === "LIKELY_SYBIL" ? "tag-likely" : n.risk === "SUSPICIOUS" ? "tag-suspicious" : "tag-clean";
          const tagText = n.risk === "CONFIRMED_SYBIL" ? "Confirmed" : n.risk === "LIKELY_SYBIL" ? "Likely" : n.risk === "SUSPICIOUS" ? "Suspicious" : "Clean";
          const dotColor = n.risk === "CONFIRMED_SYBIL" ? "#E24B4A" : n.risk === "LIKELY_SYBIL" ? "#f0c040" : n.risk === "SUSPICIOUS" ? "#EF9F27" : "#1D9E75";
          return `<div class="addr-row" onclick="showWalletDetail('${n.id}')">
            <div class="addr-dot" style="background:${dotColor}"></div>
            <div class="addr-hash">${n.id.slice(0,6)}...${n.id.slice(-4)}</div>
            <span class="addr-tag ${tagClass}">${tagText}</span>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;

  document.getElementById("panel").innerHTML = html;
}

function showWalletDetail(walletId) {
  if (!currentData) return;
  const node = currentData.nodes.find(n => n.id === walletId);
  if (!node) return;

  const color = node.risk === "CONFIRMED_SYBIL" || node.risk === "LIKELY_SYBIL" ? "#E24B4A" : node.risk === "SUSPICIOUS" ? "#EF9F27" : "#1D9E75";
  const confidencePct = Math.round(node.confidence * 100);

  let html = `
    <div class="panel-section">
      <div class="panel-title">WALLET DETAIL</div>
      <div style="font-family:monospace;font-size:11px;color:#888;margin-bottom:10px;word-break:break-all">${node.id}</div>
      <div class="verdict-badge ${node.is_sybil ? 'sybil' : 'clean'}">
        <div class="verdict-dot" style="background:${color}"></div>
        <div class="verdict-text" style="color:${color}">${node.risk.replace("_", " ")}</div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-label"><span>Confidence</span><span class="conf-val">${confidencePct}%</span></div>
        <div class="conf-bar"><div class="conf-fill" style="width:${Math.min(confidencePct, 99)}%;background:${color}"></div></div>
      </div>
      <div class="evidence-list">
        ${node.evidence.map(e => `
          <div class="ev-item">
            <div class="ev-bullet" style="background:${color}"></div>
            <div class="ev-text">${e}</div>
          </div>
        `).join("")}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">DETAILS</div>
      <div class="cluster-stats">
        <div class="cs"><div class="cs-n">${node.tx_count}</div><div class="cs-l">Transactions</div></div>
        <div class="cs"><div class="cs-n">${node.cluster_id}</div><div class="cs-l">Cluster</div></div>
      </div>
      <div style="margin-top:12px" class="reasoning">"${node.reasoning}"</div>
    </div>
    ${(node.sybil_proximity !== undefined || node.burst_score !== undefined) ? `
    <div class="panel-section">
      <div class="panel-title">GRAPH-NATIVE FEATURES</div>
      <div class="cluster-stats">
        <div class="cs"><div class="cs-n">${(node.sybil_proximity ?? 0).toFixed(2)}</div><div class="cs-l">Sybil proximity</div></div>
        <div class="cs"><div class="cs-n">${(node.burst_score ?? 0).toFixed(2)}</div><div class="cs-l">Burst score</div></div>
        <div class="cs"><div class="cs-n">${(node.hour_entropy ?? 0).toFixed(2)}</div><div class="cs-l">Hour entropy</div></div>
        <div class="cs"><div class="cs-n">${(node.ngram_entropy ?? 0).toFixed(2)}</div><div class="cs-l">N-gram entropy</div></div>
      </div>
      <div style="margin-top:10px;font-size:11px;color:#777;line-height:1.5">
        <b>Proximity</b>: k-hop label-propagation score from known sybil seeds.
        <b>Burst</b>: std/mean of inter-tx gaps (bots &lt; 0.5).
        <b>Entropy</b>: bot scheduling fingerprint (low = scripted).
      </div>
    </div>
    ` : ''}
    <div class="panel-section">
      <div style="font-size:11px;color:#444;cursor:pointer" onclick="showClusterPanel(${node.cluster_id})">&larr; Back to Cluster ${node.cluster_id}</div>
    </div>
  `;

  document.getElementById("panel").innerHTML = html;
}

// ============================================================
//  Stats
// ============================================================
function updateStats(data) {
  const totalNodes = data.nodes.filter(n => !n.is_hub).length;
  const flagged = data.nodes.filter(n => n.is_sybil && !n.is_hub).length;
  const totalUsd = data.clusters.reduce((sum, c) => sum + (c.stolen_usd || 0), 0);

  document.getElementById("stat-scanned").textContent = totalNodes;
  document.getElementById("stat-flagged").textContent = flagged;
  document.getElementById("stat-clusters").textContent = data.clusters.length;
  document.getElementById("stat-protected").textContent = "$" + (totalUsd / 1000).toFixed(0) + "K";
}

// ============================================================
//  Analysis (demo mode — hardcoded data)
// ============================================================
async function runAnalysis() {
  const btn = document.getElementById("analyze-btn");
  const input = document.getElementById("addr-input").value.trim();

  // Parse addresses from input
  let addresses = input.split(/[\n,]+/).map(a => a.trim()).filter(a => a.startsWith("0x") && a.length >= 10);

  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "Analyzing...";
  document.getElementById("graph-area").querySelector(".graph-label").textContent = "WALLET GRAPH \u00B7 ANALYZING...";

  // Show loading spinners
  document.getElementById("graph-area").querySelector("#graph-svg")?.remove();
  const loadingGraph = document.createElement("div");
  loadingGraph.className = "loading-wrap";
  loadingGraph.id = "graph-loading";
  loadingGraph.innerHTML = '<div class="spinner"></div><div class="loading-text">ANALYZING WALLETS</div><div class="loading-sub">Building clusters & running AI classification...</div>';
  document.getElementById("graph-area").appendChild(loadingGraph);

  document.getElementById("panel").innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">WAITING FOR RESULTS</div></div>';

  // If no addresses pasted, use demo data as fallback
  if (addresses.length === 0) {
    setTimeout(() => {
      currentData = DEMO_DATA;
      document.getElementById("graph-loading")?.remove();
      renderGraph(currentData);
      updateStats(currentData);
      showClusterPanel(1);
      btn.disabled = false;
      btn.classList.remove("loading");
      btn.textContent = "Analyze";
      document.getElementById("graph-area").querySelector(".graph-label").textContent = "WALLET GRAPH \u00B7 DEMO";
    }, 800);
    return;
  }

  try {
    const API_URL = window.location.origin + "/analyze";
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ addresses }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || "Server error");
    }

    const data = await resp.json();
    currentData = data;
    document.getElementById("graph-loading")?.remove();
    renderGraph(data);
    updateStats(data);
    if (data.clusters.length > 0) {
      showClusterPanel(data.clusters[0].id);
    }
    document.getElementById("graph-area").querySelector(".graph-label").textContent = "WALLET GRAPH \u00B7 LIVE";
  } catch (err) {
    console.error("Analysis failed:", err);
    document.getElementById("panel").innerHTML = `<div class="panel-empty" style="color:#E24B4A">Error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "Analyze";
  }
}

// ============================================================
//  Init — load analysis from URL param if present
// ============================================================
window.addEventListener("load", async () => {
  const params = new URLSearchParams(window.location.search);
  const name = params.get("analysis");
  if (!name) return;

  document.getElementById("graph-area").querySelector(".graph-label").textContent = `WALLET GRAPH · ${name.toUpperCase()}`;
  document.getElementById("panel").innerHTML = '<div class="panel-empty">Loading analysis...</div>';

  try {
    const resp = await fetch(`/analysis/${encodeURIComponent(name)}`);
    if (!resp.ok) throw new Error(`Analysis '${name}' not found`);
    const data = await resp.json();
    currentData = data;
    renderGraph(data);
    updateStats(data);
    if (data.clusters && data.clusters.length > 0) {
      showClusterPanel(data.clusters[0].id);
    }
    document.getElementById("graph-area").querySelector(".graph-label").textContent = `WALLET GRAPH · ${name.toUpperCase()}`;
  } catch (err) {
    document.getElementById("panel").innerHTML = `<div class="panel-empty" style="color:#E24B4A">Error: ${err.message}</div>`;
  }
});

window.addEventListener("resize", () => {
  if (currentData) renderGraph(currentData);
});
</script>
